# Domain configuration for labor law parsing (Phase 3 implementation).

# Mirrors enterprise.yaml and tax.yaml structure for consistency.
# Labor-specific patterns for employment, contracts, social insurance, rights/obligations.

# Document metadata mapping
doc_metadata:
  filename_patterns:
    - pattern: "luat_lao_dong|08_luat"
      doc_type: "law"
      domain_scope: "lao_dong"
      domain_subscope: "quyen_nghia_vu_lao_dong"
      priority: "rat_cao"
    - pattern: "nghi_dinh.*145|09_nghi_dinh"
      doc_type: "decree"
      domain_scope: "lao_dong"
      domain_subscope: "hop_dong_lao_dong"
      priority: "cao"
    - pattern: "bao_hiem_xa_hoi|10_bao_hiem"
      doc_type: "law"
      domain_scope: "bao_hiem_xa_hoi"
      domain_subscope: "nghia_vu_bao_hiem"
      priority: "cao"
    - pattern: "nghi_dinh.*158|11_nghi_dinh"
      doc_type: "decree"
      domain_scope: "bao_hiem_xa_hoi"
      domain_subscope: "thu_tuc_bao_hiem"
      priority: "cao"

  hardcoded_files:
    "08_luat_lao_dong_45_2019_QH14.doc":
      doc_id: "DOC_LUAT_LAO_DONG_45_2019"
      doc_title: "Luật Lao động"
      doc_code: "45/2019/QH14"
      doc_type: "law"
      issuing_body: "Quốc hội"
      domain_scope: "lao_dong"
      domain_subscope: "quyen_nghia_vu_lao_dong"
      
    "09_nghi_dinh_145_2020_ND-CP.doc":
      doc_id: "DOC_ND_145_2020"
      doc_title: "Nghị định về hợp đồng lao động"
      doc_code: "145/2020/NĐ-CP"
      doc_type: "decree"
      issuing_body: "Chính phủ"
      domain_scope: "lao_dong"
      domain_subscope: "hop_dong_lao_dong"
      
    "10_bao_hiem_xa_hoi_41_2024_QH15.doc":
      doc_id: "DOC_LUAT_BHXH_41_2024"
      doc_title: "Luật Bảo hiểm xã hội"
      doc_code: "41/2024/QH15"
      doc_type: "law"
      issuing_body: "Quốc hội"
      domain_scope: "bao_hiem_xa_hoi"
      domain_subscope: "nghia_vu_bao_hiem"
      
    "11_nghi_dinh_158_2025_ND-CP.doc":
      doc_id: "DOC_ND_158_2025"
      doc_title: "Nghị định về bảo hiểm xã hội"
      doc_code: "158/2025/NĐ-CP"
      doc_type: "decree"
      issuing_body: "Chính phủ"
      domain_scope: "bao_hiem_xa_hoi"
      domain_subscope: "thu_tuc_bao_hiem"

  defaults:
    when_unknown:
      domain_scope: "lao_dong"
      doc_type: "unknown"
      priority: "trung_binh"

# Normative sentence detection: subject & authority keywords
normative_detection:
  subject_keywords:
    - "người\\s+sử\\s+dụng\\s+lao\\s+động"
    - "người\\s+lao\\s+động"
    - "công\\s+đoàn"
    - "doanh\\s+nghiệp"
    - "tổ\\s+chức"
    - "cá\\s+nhân"
    - "người\\s+tham\\s+gia\\s+bảo\\s+hiểm"
    - "người\\s+đóng\\s+bảo\\s+hiểm"
    - "cơ\\s+sở\\s+kinh\\s+doanh"
    - "cơ\\s+quan\\s+bảo\\s+hiểm\\s+xã\\s+hội"
    - "cơ\\s+quan\\s+lao\\s+động"
    - "người\\s+sử\\s+dụng\\s+lao\\s+động\\s+phải"
    - "người\\s+lao\\s+động\\s+được\\s+quyền"
    - "công\\s+đoàn\\s+có\\s+quyền"
    - "doanh\\s+nghiệp\\s+không\\s+được"

  authority_keywords:
    - "cơ\\s+quan\\s+lao\\s+động"
    - "cơ\\s+quan\\s+bảo\\s+hiểm\\s+xã\\s+hội"
    - "cơ\\s+quan\\s+nhà\\s+nước\\s+có\\s+thẩm\\s+quyền"
    - "sở\\s+lao\\s+động"
    - "ủy\\s+ban\\s+nhân\\s+dân"
    - "tổng\\s+cục\\s+thuế"
    - "cục\\s+thuế"
    - "cơ\\s+quan\\s+quản\\s+lý\\s+lao\\s+động"
    - "cơ\\s+quan\\s+bảo\\s+hiểm\\s+xã\\s+hội\\s+cấp\\s+tỉnh"
    - "chủ\\s+tịch\\s+ủy\\s+ban\\s+nhân\\s+dân\\s+cấp\\s+tỉnh"
    - "bộ\\s+lao\\s+động"
    - "bộ\\s+trưởng\\s+bộ\\s+lao\\s+động"

  exception_patterns:
    - "trừ\\s+trường\\s+hợp"
    - "ngoại\\s+lệ"
    - "không\\s+áp\\s+dụng\\s+đối\\s+với"
    - "trường\\s+hợp\\s+đặc\\s+biệt"
    - "trừ\\s+khi"
    - "ngoại\\s+trừ"

  deontic_cues:
    obligation:
      - "phải"
      - "có\\s+nghĩa\\s+vụ"
      - "chịu\\s+trách\\s+nhiệm"
      - "được\\s+quy\\s+định\\s+rằng"
    permission:
      - "được\\s+phép"
      - "có\\s+quyền"
      - "được\\s+quyền"
      - "có\\s+thể"
    prohibition:
      - "không\\s+được"
      - "bị\\s+cấm"
      - "cấm"

  procedure_cues:
    - "thủ\\s+tục"
    - "quy\\s+trình"
    - "bước"
    - "thực\\s+hiện\\s+theo"
    - "đăng\\s+ký"
    - "nộp\\s+hồ\\s+sơ"
    - "cấp\\s+giấy\\s+phép"

  action_verbs:
    - "ký\\s+hợp\\s+đồng"
    - "chấm\\s+dứt\\s+hợp\\s+đồng"
    - "tham\\s+gia\\s+bảo\\s+hiểm"
    - "đóng\\s+bảo\\s+hiểm"
    - "thông\\s+báo"
    - "gửi"
    - "nộp"
    - "cấp"
    - "xem\\s*xét"
    - "từ\\s*chối"
    - "cập\\s*nhật"
    - "thực\\s*hiện"
    - "tiếp\\s*nhận"
    - "chịu\\s*trách\\s*nhiệm"
    - "phải"
    - "không\\s+được"
    - "được\\s+phép"
    - "có\\s+quyền"
    - "bị\\s+cấm"
    - "được\\s+quyền"
    - "có\\s+nghĩa\\s+vụ"
    - "được\\s+miễn"
    - "bị\\s+phạt"
    - "trừ\\s+trường\\s+hợp"
    - "ngoại\\s+lệ"
    - "cơ\\s+quan\\s+có\\s+thẩm\\s+quyền\\s+quyết\\s+định"
    - "cơ\\s+quan\\s+lao\\s+động\\s+cấp\\s+tỉnh\\s+cấp"

