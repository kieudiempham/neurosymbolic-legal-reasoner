# Normative sentence detection: subject & authority keywords
normative_detection:
  subject_keywords:
    - "người\\s+nộp\\s+thuế"
    - "doanh\\s+nghiệp"
    - "tổ\\s+chức"
    - "cá\\s+nhân"
    - "cơ\\s+sở\\s+kinh\\s+doanh"
    - "nha\\s+kinh\\s+doanh"
    - "người\\s+bán\\s+hàng"
    - "người\\s+mua\\s+hàng"
    - "cơ\\s+quan\\s+thuế"
    - "tổng\\s+cục\\s+thuế"
    - "cục\\s+thuế"
    - "chi\\s+cục\\s+thuế"

  authority_keywords:
    - "cơ\\s+quan\\s+thuế"
    - "tổng\\s+cục\\s+thuế"
    - "cục\\s+thuế"
    - "chi\\s+cục\\s+thuế"
    - "cơ\\s+quan\\s+nhà\\s+nước\\s+có\\s+thẩm\\s+quyền"

  action_verbs:
    - "khai\\s+thuế"
    - "nộp\\s+thuế"
    - "kê\\s+khai"
    - "đăng\\s+ký\\s+thuế"
    - "thông\\s+báo"
    - "gửi"
    - "nộp"
    - "cấp"
    - "xem\\s*xét"
    - "từ\\s*chối"
    - "cập\\s*nhật"
    - "thực\\s*hiện"
    - "tiếp\\s*nhận"
    - "chịu\\s*trách\\s*nhiệm"
    - "phải"
    - "không\\s+được"
    - "được\\s+phép"
    - "có\\s+quyền"
    - "bị\\s+cấm"

# Legal frame extraction: tax patterns
legal_frame_extraction:
  enterprise_entity_patterns:
    - "người nộp thuế"
    - "doanh nghiệp"
    - "tổ chức"
    - "cá nhân"
    - "cơ sở kinh doanh"
    - "nhà kinh doanh"
    - "người bán hàng"
    - "người mua hàng"
    - "cơ quan thuế"
    - "tổng cục thuế"
    - "cục thuế"
    - "chi cục thuế"

  authority_patterns:
    - "cơ quan thuế"
    - "tổng cục thuế"
    - "cục thuế"
    - "chi cục thuế"
    - "cơ quan nhà nước có thẩm quyền"

  frame_type_mapping:
    "thoi_han": "khung_thoi_han"
    "thanh_phan_ho_so": "khung_ho_so"
    "hanh_dong_co_quan": "khung_hanh_dong_co_quan"
    "ngoai_le": "khung_ngoai_le"
    "nguong_so_luong": "khung_nguong_dinh_luong"
    "ket_qua_phap_ly": "khung_ket_qua_phap_ly"
    "nghia_vu": "khung_nghia_vu"
    "quyen": "khung_quyen"
    "cam": "khung_cam"

# Predicate normalization hints
predicate_normalization:
  action_surface_to_normalized:
    "khai thuế": "khai_thue"
    "nộp thuế": "nop_thue"
    "kê khai thuế": "ke_khai_thue"
    "đăng ký thuế": "dang_ky_thue"
    "thông báo thuế": "thong_bao_thue"
    "gửi tờ khai": "gui_to_khai"
    "nộp tờ khai": "nop_to_khai"
    "cấp hóa đơn": "cap_hoa_don"
    "xuất hóa đơn": "xuat_hoa_don"
    "nhận hóa đơn": "nhan_hoa_don"
    "lưu trữ hóa đơn": "luu_tru_hoa_don"
    "thực hiện nghĩa vụ thuế": "thuc_hien_nghia_vu_thue"
    "chịu trách nhiệm thuế": "chiu_trach_nhiem_thue"
    "được khấu trừ thuế": "duoc_khau_tru_thue"
    "bị phạt thuế": "bi_phat_thue"
    "được miễn thuế": "duoc_mien_thue"
    "được giảm thuế": "duoc_giam_thue"

  weak_signal_filters:
    - "theo quy định của pháp luật"
    - "theo hướng dẫn của bộ tài chính"
    - "theo thông tư của tổng cục thuế"
    - "trừ trường hợp quy định tại"
    - "trừ trường hợp đặc biệt"

  blacklist_phrases:
    - "được quy định tại điều"
    - "theo quy định tại khoản"
    - "như sau:"
    - "bao gồm:"
    - "như sau"
