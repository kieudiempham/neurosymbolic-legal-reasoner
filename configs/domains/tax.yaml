# Domain configuration for tax law parsing (Phase 2 implementation).

# Mirrors enterprise.yaml structure for consistency.
# Tax-specific patterns for management, declaration, payment, invoices, dossiers, deadlines.

# Document metadata mapping
doc_metadata:
  filename_patterns:
    - pattern: "luat_quan_ly_thue|01_luat"
      doc_type: "law"
      domain_scope: "quan_ly_thue"
      domain_subscope: "nghia_vu_quan_ly_thue"
      priority: "rat_cao"
    - pattern: "nghi_dinh.*thue|02_nghi_dinh|03_nghi_dinh"
      doc_type: "decree"
      domain_scope: "quan_ly_thue"
      domain_subscope: "thu_tuc_khai_nop_thue"
      priority: "rat_cao"
    - pattern: "luat_thue_GTGT|04_luat"
      doc_type: "law"
      domain_scope: "thue_gia_tri_gia_tang"
      domain_subscope: "nghia_vu_thue_GTGT"
      priority: "cao"
    - pattern: "nghi_dinh.*181|05_nghi_dinh"
      doc_type: "decree"
      domain_scope: "thue_gia_tri_gia_tang"
      domain_subscope: "hoa_don_chung_tu"
      priority: "cao"
    - pattern: "luat_TNDN|06_luat"
      doc_type: "law"
      domain_scope: "thue_thu_nhap_doanh_nghiep"
      domain_subscope: "nghia_vu_thue_TNDN"
      priority: "cao"
    - pattern: "nghi_dinh.*320|07_nghi_dinh"
      doc_type: "decree"
      domain_scope: "thue_thu_nhap_doanh_nghiep"
      domain_subscope: "thu_tuc_khai_nop_TNDN"
      priority: "cao"

  hardcoded_files:
